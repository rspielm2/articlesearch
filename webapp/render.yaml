services:
  - type: web
    name: ka-article-search
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers=1 --threads=8 --worker-class=gthread --timeout=600 --bind=0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: REDIS_URL
        sync: false
